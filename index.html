<!DOCTYPE html>
<html>
<head>
    <title>TruthScan AI Detector</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; background: #f0f4f8; }
        h1 { color: #1e3a5f; text-align: center; }
        textarea { width: 100%; height: 150px; padding: 15px; font-size: 16px; border: 2px solid #ccc; border-radius: 10px; }
        button { width: 100%; padding: 15px; font-size: 18px; background: #2563eb; color: white; border: none; border-radius: 10px; margin-top: 15px; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        #result { margin-top: 30px; padding: 20px; background: white; border-radius: 15px; text-align: center; display: none; }
        .score { font-size: 60px; font-weight: bold; }
        .high { color: #dc2626; }
        .medium { color: #ea580c; }
        .low { color: #16a34a; }
        .info { color: #6b7280; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🔍 TruthScan AI Detector</h1>
    <p style="text-align:center; color:#666;">Paste text below to check if it's AI-generated</p>
    
    <textarea id="textInput" placeholder="Type or paste text here (minimum 20 characters)..."></textarea>
    <button onclick="checkText()">Check for AI</button>
    
    <div id="result">
        <div class="score" id="scoreValue">0%</div>
        <div class="info" id="riskValue">Risk: -</div>
        <div class="info" id="confidenceValue">Confidence: -</div>
        <div class="info" id="sentencesValue">Sentences: -</div>
    </div>

    <script>
        const API_URL = "https://lapdog-automaker-open.ngrok-free.dev/api/detect";

        function checkText() {
            const text = document.getElementById("textInput").value;
            
            if (text.length < 20) {
                alert("Please enter at least 20 characters");
                return;
            }

            document.getElementById("result").style.display = "block";
            document.getElementById("scoreValue").textContent = "Analyzing...";

            fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: text })
            })
            .then(res => res.json())
            .then(data => {
                const score = data.overall_score;
                const scoreEl = document.getElementById("scoreValue");
                const riskEl = document.getElementById("riskValue");
                const confEl = document.getElementById("confidenceValue");
                const sentEl = document.getElementById("sentencesValue");

                scoreEl.textContent = score + "% AI";
                
                if (score >= 70) scoreEl.className = "score high";
                else if (score >= 40) scoreEl.className = "score medium";
                else scoreEl.className = "score low";

                riskEl.textContent = "Risk Level: " + data.risk_level;
                confEl.textContent = "Confidence: " + data.confidence + "%";
                sentEl.textContent = "Sentences Analyzed: " + data.metadata.sentence_count;
            })
            .catch(err => {
                document.getElementById("scoreValue").textContent = "Error";
                document.getElementById("riskValue").textContent = err.message;
            });
        }
    </script>
</body>
</html>
